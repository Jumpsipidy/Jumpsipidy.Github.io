<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<title>TAMSA v2 — Lietuvių Siaubo Žaidimas</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace;}
#c{display:block;width:100vw;height:100vh;}

/* ── CROSSHAIR ── */
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:18px;height:18px;pointer-events:none;z-index:10;}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,200,0.6);}
#crosshair::before{width:1px;height:100%;left:50%;transform:translateX(-50%);}
#crosshair::after{width:100%;height:1px;top:50%;transform:translateY(-50%);}

/* ── INTERACT PROMPT ── */
#interact{position:fixed;bottom:34%;left:50%;transform:translateX(-50%);color:#ddd;font-size:13px;text-align:center;opacity:0;transition:opacity 0.25s;text-shadow:1px 1px 4px #000,0 0 8px #000;letter-spacing:3px;z-index:10;}

/* ── HUD ── */
#hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
#notes-counter{position:absolute;top:18px;right:22px;color:#777;font-size:11px;letter-spacing:3px;}
#sanity-wrap{position:absolute;bottom:20px;left:20px;font-size:10px;color:#444;letter-spacing:2px;}
#sanity-bar-bg{width:120px;height:3px;background:#1a0000;margin-top:4px;border-radius:2px;}
#sanity-bar{width:120px;height:3px;background:#8b0000;border-radius:2px;transition:width 0.5s;}
#flashlight-flicker{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 50% 45%, transparent 0%, rgba(0,0,0,0.45) 100%);z-index:8;}

/* ── VHS OVERLAY ── */
#vhs-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50;}

/* ── NOTE OVERLAY ── */
#note-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.88);display:none;align-items:center;justify-content:center;z-index:120;pointer-events:all;}
#note-paper{
  background:#cfc090;
  color:#1a1008;
  padding:44px 48px;
  max-width:520px;width:90%;
  border-radius:1px;
  font-family:'Courier New',monospace;
  font-size:14px;
  line-height:1.9;
  position:relative;
  box-shadow:0 0 80px rgba(0,0,0,0.9),inset 0 0 30px rgba(0,0,0,0.15);
  transform:rotate(-0.8deg);
  border-left:3px solid #a08040;
}
#note-paper::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:repeating-linear-gradient(transparent,transparent 28px,rgba(80,50,0,0.12) 29px);
  pointer-events:none;border-radius:1px;
}
#note-title{font-size:16px;font-weight:bold;margin-bottom:18px;text-align:center;text-decoration:underline;text-underline-offset:4px;letter-spacing:1px;}
#note-close{position:absolute;top:12px;right:16px;font-size:18px;cursor:pointer;color:#6a4020;opacity:0.7;}
#note-close:hover{opacity:1;}
#note-hint{margin-top:22px;font-size:10px;text-align:center;color:#7a5030;font-style:italic;letter-spacing:1px;}
#note-stain{position:absolute;bottom:30px;right:30px;width:60px;height:40px;border-radius:50%;background:radial-gradient(ellipse,rgba(80,30,0,0.2),transparent);transform:rotate(20deg);}

/* ── JUMPSCARE ── */
#jumpscare{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:300;display:none;
  background:#000;
  align-items:center;justify-content:center;
  overflow:hidden;
}
#js-monster{
  position:absolute;
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
}
#js-monster img{
  max-width:90vw;max-height:90vh;
  object-fit:contain;
  filter:brightness(2) contrast(1.5);
  animation:none;
}
/* JUMPSCARE ANIMATIONS */
@keyframes jsRush{
  0%{transform:scale(0.05) translateY(30%);opacity:0;}
  15%{opacity:1;}
  100%{transform:scale(2.5) translateY(-5%);opacity:1;}
}
@keyframes jsShake{
  0%,100%{transform:translateX(0) translateY(0);}
  10%{transform:translateX(-12px) translateY(-8px);}
  20%{transform:translateX(12px) translateY(8px);}
  30%{transform:translateX(-8px) translateY(4px);}
  40%{transform:translateX(8px) translateY(-4px);}
  50%{transform:translateX(-5px) translateY(5px);}
  60%{transform:translateX(5px) translateY(-5px);}
  70%{transform:translateX(-3px) translateY(3px);}
  80%{transform:translateX(3px) translateY(-3px);}
}
@keyframes jsTwitch{
  0%{transform:scale(1) rotate(0deg);}
  5%{transform:scale(1.08) rotate(-3deg);}
  10%{transform:scale(0.95) rotate(2deg);}
  15%{transform:scale(1.12) rotate(-1deg);}
  20%{transform:scale(1) rotate(0deg);}
  100%{transform:scale(1) rotate(0deg);}
}
@keyframes jsFlash{
  0%,100%{background:#000;}
  10%,30%,50%{background:#fff;}
  20%,40%{background:#000;}
}
.js-anim-rush #js-monster img{animation:jsRush 0.8s cubic-bezier(0.25,0,0.6,1) forwards;}
.js-anim-shake{animation:jsShake 0.7s ease-in-out;}
.js-anim-flash{animation:jsFlash 0.5s ease-in-out;}
.js-anim-twitch #js-monster img{animation:jsTwitch 1.2s ease-in-out;}
#js-overlay-red{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(180,0,0,0);pointer-events:none;transition:background 0.1s;}
#js-text{position:absolute;bottom:10%;left:50%;transform:translateX(-50%);color:#fff;font-size:22px;letter-spacing:6px;text-transform:uppercase;opacity:0;text-shadow:0 0 20px #f00;}

/* ── MENU ── */
#menu{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:#000;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:400;
}
#menu::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,0.3) 0px,rgba(0,0,0,0.3) 1px,transparent 1px,transparent 3px);
  pointer-events:none;
}
#menu h1{
  color:#8b0000;font-size:52px;letter-spacing:12px;
  text-transform:uppercase;margin-bottom:8px;
  text-shadow:0 0 40px #8b0000,0 0 80px #4a0000;
  animation:titlePulse 3s ease-in-out infinite;
}
@keyframes titlePulse{0%,100%{text-shadow:0 0 40px #8b0000,0 0 80px #4a0000;}50%{text-shadow:0 0 20px #8b0000,0 0 40px #4a0000,0 0 120px #8b000044;}}
#menu .sub{color:#333;font-size:11px;letter-spacing:5px;margin-bottom:70px;}
#menu button{
  background:transparent;border:1px solid #3a0000;
  color:#8b0000;font-family:'Courier New',monospace;
  font-size:14px;letter-spacing:5px;padding:13px 55px;
  cursor:pointer;margin:6px;transition:all 0.3s;
}
#menu button:hover{background:#1a0000;color:#cc4444;border-color:#8b0000;box-shadow:0 0 25px #8b000055;}
#menu .warning{position:absolute;bottom:18px;color:#1a1a1a;font-size:10px;letter-spacing:3px;}

/* ── DEATH SCREEN ── */
#death{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:#000;display:none;align-items:center;
  justify-content:center;flex-direction:column;z-index:500;
  animation:deathFade 2s ease-in forwards;
}
@keyframes deathFade{from{background:rgba(180,0,0,0.3);}to{background:#000;}}
#death h2{color:#8b0000;font-size:40px;letter-spacing:8px;margin-bottom:12px;text-shadow:0 0 30px #8b0000;}
#death .sub2{color:#2a2a2a;font-size:12px;letter-spacing:4px;margin-bottom:40px;}
#death button{background:transparent;border:1px solid #222;color:#555;font-family:'Courier New',monospace;font-size:12px;padding:10px 28px;cursor:pointer;letter-spacing:3px;transition:all 0.3s;}
#death button:hover{border-color:#555;color:#888;}

/* ── BREATHING OVERLAY (low sanity) ── */
#breathe{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:7;opacity:0;transition:opacity 1s;}
#breathe-inner{width:100%;height:100%;background:radial-gradient(ellipse at center,transparent 20%,rgba(80,0,0,0.6) 100%);}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="crosshair"></div>
  <div id="interact">[ E ] SKAITYTI / ATIDARYTI</div>
  <div id="notes-counter">UŽRAŠAI: <span id="nc">0</span>/5</div>
  <div id="sanity-wrap">
    PSICHINĖ BŪKLĖ: <span id="san">100</span>%
    <div id="sanity-bar-bg"><div id="sanity-bar"></div></div>
  </div>
</div>

<!-- Flashlight vignette -->
<div id="flashlight-flicker"></div>

<!-- Breathing red vignette (low sanity) -->
<div id="breathe"><div id="breathe-inner"></div></div>

<!-- VHS overlay -->
<canvas id="vhs-canvas"></canvas>

<!-- Note reading overlay -->
<div id="note-overlay">
  <div id="note-paper">
    <span id="note-close">✕</span>
    <div id="note-title"></div>
    <div id="note-body"></div>
    <div id="note-stain"></div>
    <div id="note-hint">[ Spustelėkite arba paspauskite ESC ]</div>
  </div>
</div>

<!-- JUMPSCARE overlay -->
<div id="jumpscare">
  <div id="js-overlay-red"></div>
  <div id="js-monster">
    <!-- WHITE MONSTER PNG — replace src with your own image path -->
    <img id="monster-img" src="images.png" alt="monster" onerror="this.style.display='none';document.getElementById('js-fallback').style.display='flex'"/>
    <!-- Fallback drawn monster if no PNG loaded -->
    <canvas id="js-fallback" width="500" height="600" style="display:none;max-width:80vw;max-height:80vh;"></canvas>
  </div>
  <div id="js-text">JIS ČIA</div>
</div>

<!-- MENU -->
<div id="menu">
  <h1>TAMSA</h1>
  <p class="sub">KAUNAS · 1987</p>
  <button onclick="startGame()">▶ PRADĖTI</button>
  <button onclick="showInfo()">VALDYMAS</button>
  <p class="warning">⚠ STIPRŪS GARSO EFEKTAI · ŠOKINĖJANTYS SIURPRIZAI dideli negrai</p>
</div>

<!-- DEATH -->
<div id="death">
  <h2>JIS RADO TAVE</h2>
  <p class="sub2">Niekada neturėjai čia ateiti.</p>
  <button onclick="location.reload()">↺ BANDYTI IŠ NAUJO</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
// ═══════════════════════════════════════════════════════════
//  DRAW WHITE MONSTER onto fallback canvas (nextbot style)
// ═══════════════════════════════════════════════════════════
function drawWhiteMonster() {
  const cv = document.getElementById('js-fallback');
  const cx = cv.getContext('2d');
  cx.clearRect(0,0,cv.width,cv.height);

  // Glow aura
  const grd = cx.createRadialGradient(250,300,30,250,300,280);
  grd.addColorStop(0,'rgba(255,255,255,0.25)');
  grd.addColorStop(1,'rgba(255,255,255,0)');
  cx.fillStyle = grd;
  cx.fillRect(0,0,500,600);

  cx.fillStyle = '#fff';
  cx.shadowColor = '#ffffff';
  cx.shadowBlur = 30;

  // Torso — slightly distorted rectangle
  cx.beginPath();
  cx.moveTo(155,200); cx.lineTo(345,195);
  cx.lineTo(360,480); cx.lineTo(140,485);
  cx.closePath(); cx.fill();

  // Head — elongated
  cx.beginPath();
  cx.ellipse(250,130,78,100,0,0,Math.PI*2);
  cx.fill();

  // Long neck
  cx.fillRect(225,210,50,40);

  // Arms — unnaturally long, hanging low
  cx.beginPath();
  cx.moveTo(155,220); cx.lineTo(60,420);
  cx.lineTo(50,415); cx.lineTo(75,205); cx.lineTo(165,210);
  cx.fill();
  cx.beginPath();
  cx.moveTo(345,215); cx.lineTo(440,415);
  cx.lineTo(450,410); cx.lineTo(425,200); cx.lineTo(335,210);
  cx.fill();

  // Legs
  cx.fillRect(165,475,70,100);
  cx.fillRect(260,475,70,100);

  // Fingers (creepy long)
  [50,55,60,65,70].forEach((x,i)=>{
    cx.fillRect(x-2+i*2,415,4,30+i*5);
  });
  [445,450,455,460,465].forEach((x,i)=>{
    cx.fillRect(x-2+i,410,4,30+i*5);
  });

  // NO FACE — just two pitch black voids for eyes
  cx.shadowBlur = 0;
  cx.fillStyle = '#000';
  cx.beginPath(); cx.ellipse(225,115,14,20,-.15,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(275,113,14,20,.15,0,Math.PI*2); cx.fill();

  // Mouth — wide jagged grin
  cx.strokeStyle = '#000';
  cx.lineWidth = 3;
  cx.beginPath();
  cx.moveTo(200,160);
  for(let i=0;i<=10;i++){
    const mx=200+i*10;
    const my=160+(i%2===0?8:-8);
    cx.lineTo(mx,my);
  }
  cx.stroke();
}
drawWhiteMonster();

// ═══════════════════════════════════════════════════════════
//  AUDIO ENGINE
// ═══════════════════════════════════════════════════════════
const AudioCtxClass = window.AudioContext || window.webkitAudioContext;
let actx, masterGain, reverbNode;

function initAudio() {
  actx = new AudioCtxClass();
  masterGain = actx.createGain();
  masterGain.gain.value = 0.9;

  // Simple reverb via convolver
  reverbNode = actx.createConvolver();
  const len = actx.sampleRate * 2.5;
  const impulse = actx.createBuffer(2, len, actx.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=impulse.getChannelData(ch);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.5);
  }
  reverbNode.buffer = impulse;
  masterGain.connect(actx.destination);
}

function connectOut(node, wet=false) {
  if(!actx) return;
  if(wet) { node.connect(reverbNode); reverbNode.connect(masterGain); }
  else node.connect(masterGain);
}

function playTone(freq,dur,vol=0.3,type='sine',wet=false) {
  if(!actx) return;
  const o=actx.createOscillator(), g=actx.createGain();
  o.connect(g); o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(vol,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
  connectOut(g,wet);
  o.start(); o.stop(actx.currentTime+dur);
}

function playNoise(dur,vol=0.5,lowpass=20000) {
  if(!actx) return;
  const buf=actx.createBuffer(1,actx.sampleRate*dur,actx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const src=actx.createBufferSource();
  const g=actx.createGain(); g.gain.value=vol;
  const f=actx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=lowpass;
  src.buffer=buf; src.connect(f); f.connect(g); connectOut(g);
  src.start(); src.stop(actx.currentTime+dur);
}

function playAmbient() {
  if(!actx) return;
  // Deep bass rumble
  [28,42,56,71].forEach((f,i)=>{
    const o=actx.createOscillator(), g=actx.createGain();
    const dist=actx.createWaveShaper();
    const curve=new Float32Array(512);
    for(let j=0;j<512;j++){const x=j*2/512-1;curve[j]=Math.tanh(x*3)*0.6;}
    dist.curve=curve;
    o.connect(dist); dist.connect(g);
    o.type='sawtooth'; o.frequency.value=f;
    g.gain.value=0.025+(i%2)*0.01;
    connectOut(g,true);
    o.start();
    // LFO wobble
    const lfo=actx.createOscillator(), lg=actx.createGain();
    lfo.frequency.value=0.05+i*0.02; lg.gain.value=2;
    lfo.connect(lg); lg.connect(o.frequency);
    lfo.start();
  });
  // High whine
  const hw=actx.createOscillator(), hwg=actx.createGain();
  hw.type='sine'; hw.frequency.value=3200;
  hwg.gain.value=0.008;
  hw.connect(hwg); connectOut(hwg);
  hw.start();
}

function playCreak() {
  if(!actx) return;
  const buf=actx.createBuffer(1,actx.sampleRate*0.6,actx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++){
    const t=i/actx.sampleRate;
    d[i]=Math.sin(t*600*Math.exp(-t*6))*Math.random()*0.5*Math.exp(-t*4)
        +Math.sin(t*900*Math.exp(-t*10))*Math.random()*0.2*Math.exp(-t*6);
  }
  const src=actx.createBufferSource(), g=actx.createGain(); g.gain.value=0.7;
  src.buffer=buf; src.connect(g); connectOut(g,true); src.start();
}

function playScream() {
  if(!actx) return;
  const buf=actx.createBuffer(2,actx.sampleRate*2.2,actx.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=buf.getChannelData(ch);
    for(let i=0;i<d.length;i++){
      const t=i/actx.sampleRate;
      const f1=800+Math.sin(t*18)*400+Math.sin(t*7)*200;
      const f2=1200+Math.sin(t*23)*300;
      d[i]=((Math.random()*2-1)*0.5+Math.sin(t*f1)*0.4+Math.sin(t*f2)*0.25)
           *Math.exp(-t*0.7)*(ch===1?-1:1)*0.9;
    }
  }
  const src=actx.createBufferSource(), g=actx.createGain(); g.gain.value=1.1;
  const comp=actx.createDynamicsCompressor(); comp.threshold.value=-6; comp.ratio.value=8;
  src.buffer=buf; src.connect(comp); comp.connect(g); connectOut(g); src.start();
}

function playHeartbeat(fast=false) {
  if(!actx) return;
  const interval=fast?350:650;
  let count=0;
  function beat(){
    playTone(55,0.14,0.55,'sine'); 
    setTimeout(()=>playTone(48,0.18,0.45,'sine'),160);
    if(++count<(fast?8:4)) setTimeout(beat,interval);
  }
  beat();
}

function playWhisper() {
  if(!actx) return;
  const buf=actx.createBuffer(1,actx.sampleRate*1.8,actx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++){
    const t=i/actx.sampleRate;
    d[i]=(Math.random()*2-1)*0.25*Math.sin(t*200+Math.sin(t*3)*50)*
          (Math.sin(t*Math.PI/1.8))*0.8;
  }
  const src=actx.createBufferSource(), g=actx.createGain(); g.gain.value=0.5;
  const f=actx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=800; f.Q.value=0.8;
  src.buffer=buf; src.connect(f); f.connect(g); connectOut(g,true); src.start();
}

function playDoor() {
  if(!actx) return;
  // Metal impact + resonance
  playTone(80,0.05,0.8,'square');
  setTimeout(()=>playCreak(),60);
  playNoise(0.08,0.6,500);
}

function playStatic(dur=0.35) {
  if(!actx) return;
  playNoise(dur,0.55,8000);
  playNoise(dur,0.3,2000);
}

function playDistantBang() {
  if(!actx) return;
  playTone(60,0.08,0.9,'square');
  setTimeout(()=>playTone(40,0.3,0.4,'sine'),80);
  playNoise(0.4,0.5,400);
}

function playBreathing() {
  if(!actx) return;
  // Inhale
  const b1=actx.createBuffer(1,actx.sampleRate*0.8,actx.sampleRate);
  const d1=b1.getChannelData(0);
  for(let i=0;i<d1.length;i++){
    const t=i/actx.sampleRate;
    d1[i]=(Math.random()*2-1)*0.15*Math.sin(t*Math.PI/0.8)*0.6;
  }
  const s1=actx.createBufferSource(), g1=actx.createGain(); g1.gain.value=0.6;
  const f1=actx.createBiquadFilter(); f1.type='bandpass'; f1.frequency.value=500; f1.Q.value=1.5;
  s1.buffer=b1; s1.connect(f1); f1.connect(g1); connectOut(g1,true); s1.start();
  // Exhale
  setTimeout(()=>{
    const b2=actx.createBuffer(1,actx.sampleRate*1.0,actx.sampleRate);
    const d2=b2.getChannelData(0);
    for(let i=0;i<d2.length;i++){
      const t=i/actx.sampleRate;
      d2[i]=(Math.random()*2-1)*0.12*Math.sin(t*Math.PI/1.0)*0.5;
    }
    const s2=actx.createBufferSource(), g2=actx.createGain(); g2.gain.value=0.5;
    const f2=actx.createBiquadFilter(); f2.type='bandpass'; f2.frequency.value=400; f2.Q.value=2;
    s2.buffer=b2; s2.connect(f2); f2.connect(g2); connectOut(g2,true); s2.start();
  },900);
}

function playFootstep() {
  if(!actx) return;
  const buf=actx.createBuffer(1,actx.sampleRate*0.18,actx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++){
    const t=i/actx.sampleRate;
    d[i]=(Math.random()*2-1)*Math.exp(-t*28)*0.5
         +Math.sin(t*180+Math.random()*20)*Math.exp(-t*18)*0.35
         +Math.sin(t*80)*Math.exp(-t*35)*0.2;
  }
  const src=actx.createBufferSource(), g=actx.createGain(); g.gain.value=0.55;
  src.buffer=buf; src.connect(g); connectOut(g); src.start();
}

function playPaperRustle() {
  if(!actx) return;
  playNoise(0.5,0.35,6000);
  setTimeout(()=>playNoise(0.3,0.2,8000),200);
}

// ═══════════════════════════════════════════════════════════
//  VHS ENGINE — enhanced
// ═══════════════════════════════════════════════════════════
const vhsCv=document.getElementById('vhs-canvas');
const vctx=vhsCv.getContext('2d');
let vhsT=0, vhsGlitchTimer=0, vhsGlitchActive=false;

function resizeVHS(){vhsCv.width=window.innerWidth;vhsCv.height=window.innerHeight;}
resizeVHS();
window.addEventListener('resize',resizeVHS);

function drawVHS(){
  requestAnimationFrame(drawVHS);
  vhsT++;
  const w=vhsCv.width, h=vhsCv.height;
  vctx.clearRect(0,0,w,h);

  // Scanlines
  for(let y=0;y<h;y+=2){
    vctx.fillStyle=`rgba(0,0,0,${0.06+Math.sin(vhsT*0.02+y*0.01)*0.01})`;
    vctx.fillRect(0,y,w,1);
  }

  // Rolling bar (occasional)
  if(vhsT%240<3){
    const by=(vhsT%240/3)*h;
    vctx.fillStyle='rgba(255,255,255,0.04)';
    vctx.fillRect(0,by,w,4);
  }

  // Horizontal glitch bands
  vhsGlitchTimer++;
  if(vhsGlitchTimer>80+Math.random()*120){
    vhsGlitchTimer=0; vhsGlitchActive=true;
    setTimeout(()=>vhsGlitchActive=false,120+Math.random()*200);
  }
  if(vhsGlitchActive){
    for(let i=0;i<4;i++){
      const gy=Math.random()*h;
      const gh=Math.random()*20+4;
      vctx.fillStyle=`rgba(${Math.random()<0.5?255:0},0,${Math.random()<0.5?255:0},${Math.random()*0.08})`;
      vctx.fillRect(0,gy,w,gh);
      // Shift line
      vctx.fillStyle=`rgba(255,255,255,0.03)`;
      vctx.fillRect(Math.random()*40-20,gy,w,2);
    }
    // Chromatic aberration
    vctx.fillStyle='rgba(255,0,0,0.04)';
    vctx.fillRect(3,0,w,h);
    vctx.fillStyle='rgba(0,0,255,0.04)';
    vctx.fillRect(-3,0,w,h);
  }

  // Random noise specks
  for(let i=0;i<(vhsGlitchActive?40:8);i++){
    vctx.fillStyle=`rgba(255,255,255,${Math.random()*0.12})`;
    vctx.fillRect(Math.random()*w,Math.random()*h,Math.random()*3+1,1);
  }

  // Vignette
  const grad=vctx.createRadialGradient(w/2,h/2,h*0.25,w/2,h/2,h*0.85);
  grad.addColorStop(0,'transparent');
  grad.addColorStop(1,'rgba(0,0,0,0.65)');
  vctx.fillStyle=grad;
  vctx.fillRect(0,0,w,h);

  // REC dot — flickers
  const recOn=Math.floor(vhsT/55)%2===0;
  if(recOn){
    vctx.fillStyle='rgba(220,30,30,0.85)';
    vctx.beginPath(); vctx.arc(22,22,5,0,Math.PI*2); vctx.fill();
  }
  vctx.fillStyle='rgba(255,255,255,0.35)';
  vctx.font='10px Courier New';
  if(recOn) vctx.fillText('● REC',32,26);
  // Timer
  const mins=String(Math.floor(vhsT/3600)).padStart(2,'0');
  const secs=String(Math.floor(vhsT/60)%60).padStart(2,'0');
  const ms=String(Math.floor((vhsT%60)/6)).padStart(1,'0');
  vctx.fillStyle='rgba(255,255,255,0.28)';
  vctx.fillText(`SP  ${mins}:${secs}.${ms}`,w-85,h-12);
  vctx.fillText('PLAY ▶',12,h-12);
}
drawVHS();

// ── GEOMETRY HELPERS ──
function mat(color,rough=0.88,metal=0,emissive=0x000000,emissInt=0.05){
  return new THREE.MeshStandardMaterial({color,roughness:rough,metalness:metal,emissive,emissiveIntensity:emissInt});
}
function box(w,h,d,material){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),material);
  m.castShadow=true; m.receiveShadow=true; return m;
}

function buildWorld(){
  // ── GROUND ──
  const gMat=new THREE.MeshStandardMaterial({color:0x0d0d0d,roughness:0.97,metalness:0.0});
  const gnd=new THREE.Mesh(new THREE.PlaneGeometry(80,80,30,30),gMat);
  gnd.rotation.x=-Math.PI/2; gnd.receiveShadow=true; scene.add(gnd);

  // Pavement grid lines
  for(let i=-20;i<20;i+=2.5){
    const lm=new THREE.MeshStandardMaterial({color:0x080808});
    const lh=new THREE.Mesh(new THREE.PlaneGeometry(80,0.04),lm);
    lh.rotation.x=-Math.PI/2; lh.position.set(0,0.002,i); scene.add(lh);
    const lv=new THREE.Mesh(new THREE.PlaneGeometry(0.04,80),lm);
    lv.rotation.x=-Math.PI/2; lv.position.set(i,0.002,0); scene.add(lv);
  }

  // ── MAIN BUILDING ──
  buildBuilding(-8,0,-16,18,20,5.5);
  // ── SIDE WING ──
  buildBuilding(12,0,-13,11,15,5,true);
  // ── BACK WALL ──
  const bw=box(50,8,0.3,mat(0x0a0a0a));
  bw.position.set(0,4,-23); scene.add(bw);

  // ── ROAD ──
  const road=new THREE.Mesh(new THREE.PlaneGeometry(9,80),new THREE.MeshStandardMaterial({color:0x0c0c0c,roughness:1}));
  road.rotation.x=-Math.PI/2; road.position.set(5,0.003,0); road.receiveShadow=true; scene.add(road);
  // Dashes
  for(let z=-30;z<30;z+=4.5){
    const dash=new THREE.Mesh(new THREE.PlaneGeometry(0.12,2.2),new THREE.MeshStandardMaterial({color:0x2a2a18}));
    dash.rotation.x=-Math.PI/2; dash.position.set(5,0.004,z); scene.add(dash);
  }

  // ── ENTRANCE ──
  buildEntrance();

  // ── LAMP POSTS ──
  [-6,-12,8,14,-3].forEach((x,i)=>{
    buildLampPost(x,0,[-2,6,5,-4,12][i]);
  });
  // Extra wall-mounted lamps on building
  [-5,0,5].forEach(x=>{

  });

  // ── BENCHES ──

  buildBench(-8,0,3,0);

  // ── DUMPSTER ──
  buildDumpster(7,0,-7);
  buildDumpster(-13,0,2);

  // ── TREES ──
  buildTree(-11,0,4);
  buildTree(2,0,-8);
  buildTree(-3,0,9);
  buildTree(9,0,-5);

  // ── FENCE ──
  for(let x=-20;x<20;x+=1.25){
    const post=box(0.07,1.8,0.07,mat(0x111111,0.85,0.4));
    post.position.set(x,0.9,-23.2); scene.add(post);
    if((x+20)%2.5<0.1){
      const rail=box(0.04,0.04,1.8,mat(0x0d0d0d,0.8,0.5));
      rail.rotation.y=Math.PI/2; rail.position.set(x,1.5,-23.2); scene.add(rail);
    }
  }
  const topRail=box(40,0.06,0.06,mat(0x111111,0.8,0.5));
  topRail.position.set(0,1.8,-23.2); scene.add(topRail);

  // ── PUDDLES ── (reflective ground patches)
  for(let i=0;i<8;i++){
    const pg=new THREE.Mesh(
      new THREE.CircleGeometry(0.3+Math.random()*0.4,16),
      new THREE.MeshStandardMaterial({color:0x050810,roughness:0.0,metalness:0.9,opacity:0.7,transparent:true})
    );

    pg.position.set(-8+Math.random()*16,0.003,-5+Math.random()*10);

  }

  placeNotes();
}

function buildBuilding(x,y,z,w,h,d,wing=false){
  const wallCol=wing?0x0e0e0e:0x111111;
  const bMat=mat(wallCol,0.95);
  const concMat=mat(0x0d0d0d,0.92);

  // Body
  const body=box(w,h,d,bMat);
  body.position.set(x,y+h/2,z);
  scene.add(body);

  // Horizontal concrete bands every floor
  for(let r=0;r<=Math.floor(h/3);r++){
    const band=box(w+0.1,0.07,d+0.1,concMat);
    band.position.set(x,y+r*3,z); scene.add(band);
  }

  // Windows
  const cols=Math.floor(w/2.4), rows=Math.floor(h/3);
  for(let c=0;c<cols;c++){
    for(let r=0;r<rows;r++){
      const wx=x-w/2+1.3+c*(w/cols);
      const wy=y+1.6+r*3;
      const wz=z-d/2-0.06;
      // Frame
      const frame=box(1.0,1.4,0.12,mat(0x090909,0.8,0.25));
      frame.position.set(wx,wy,wz); scene.add(frame);
      // Glass
      const lit=Math.random()<0.07;
      const gl=box(0.85,1.15,0.04,new THREE.MeshStandardMaterial({
        color:lit?0x151005:0x030307,roughness:0.05,metalness:0.95,
        emissive:lit?0x0d0902:0x000000,emissiveIntensity:lit?1.2:0
      }));
      gl.position.set(wx,wy,wz-0.03); scene.add(gl);
      // Occasional silhouette
      if(Math.random()<0.035){
        const sil=box(0.22,0.65,0.01,new THREE.MeshStandardMaterial({
          color:0x000000,emissive:0x000200,emissiveIntensity:0.4,transparent:true,opacity:0.9
        }));
        sil.position.set(wx+(Math.random()-0.5)*0.3,wy,wz-0.04); scene.add(sil);
      }
    }
  }

  // Balconies
  for(let c=0;c<cols;c++){
    if(Math.random()<0.55){
      const bx2=x-w/2+1.3+c*(w/cols);
      const r=Math.floor(Math.random()*(rows-1))+1;
      const floor=box(1.3,0.09,1.1,mat(0x0c0c0c,0.9));
      floor.position.set(bx2,r*3,z-d/2-0.55); scene.add(floor);
      const railing=box(1.3,0.85,0.04,mat(0x0a0a0a,0.8,0.4,0x000000));
      railing.position.set(bx2,r*3+0.47,z-d/2-1.03); scene.add(railing);
      // Occasional item on balcony
      if(Math.random()<0.3){
        const item=box(0.2,0.35,0.15,mat(0x0a0805,0.95));
        item.position.set(bx2+Math.random()*0.3,r*3+0.2,z-d/2-0.7); scene.add(item);
      }
    }
  }

  // Roof
  const roof=box(w+0.6,0.35,d+0.6,mat(0x090909,0.93));
  roof.position.set(x,y+h+0.17,z); scene.add(roof);
  const roofEdge=box(w+1.0,0.12,d+1.0,mat(0x0c0c0c,0.9));
  roofEdge.position.set(x,y+h,z); scene.add(roofEdge);

  // Stairwell bump
  const sw=box(2.5,2.5,3,mat(0x0d0d0d,0.95));
  sw.position.set(x-w/2+2,y+h+1.3,z); scene.add(sw);
}

  const rp=box(0.45,3.2,0.45,pm); rp.position.set(1.6,1.6,-12.55); scene.add(rp);

function buildBench(x,y,z,rot=0){
  const bm=mat(0x0b0b0a,0.95);
  const seat=box(1.6,0.09,0.5,bm); seat.position.set(x,y+0.48,z); seat.rotation.y=rot; scene.add(seat);
  [-0.65,0.65].forEach(ox=>{
    [-0.18,0.18].forEach(oz=>{
      const leg=box(0.06,0.48,0.06,bm);
      leg.position.set(x+ox*Math.cos(rot)-oz*Math.sin(rot),y+0.24,z+ox*Math.sin(rot)+oz*Math.cos(rot));
      scene.add(leg);
    });
  });
  const back=box(1.6,0.42,0.07,bm); back.position.set(x,y+0.74,z+0.21); back.rotation.y=rot; scene.add(back);

function buildDumpster(x,y,z){
  const dm=mat(0x090d09,0.88,0.35);
  const dBody=box(1.6,1.2,1.0,dm); dBody.position.set(x,y+0.6,z); scene.add(dBody);
  const lid=box(1.65,0.09,1.05,mat(0x07090a,0.85,0.4));
  lid.position.set(x,y+1.25,z); scene.add(lid);
  const grime=box(1.58,0.35,1.02,mat(0x060808,0.99));
  grime.position.set(x,y+0.17,z); scene.add(grime);
  // Graffiti mark (slightly emissive)
  const tag=box(0.4,0.25,0.01,new THREE.MeshStandardMaterial({color:0x0a0a0f,emissive:0x000008,emissiveIntensity:0.6}));
  tag.position.set(x+0.2,y+0.7,z-0.51); scene.add(tag);
}

function buildTree(x,y,z){
  const tm=mat(0x0a0806,0.97);
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.17,3.2,8),tm);
  trunk.position.set(x,y+1.6,z); trunk.castShadow=true; scene.add(trunk);
  const bm=mat(0x080705,0.97);
  function branch(angle,len,py,thick,sub=true){
    const br=new THREE.Mesh(new THREE.CylinderGeometry(thick*0.5,thick,len,6),bm);
    br.position.set(x+Math.cos(angle)*len*0.45,py,z+Math.sin(angle)*len*0.45);
    br.rotation.z=Math.cos(angle)*0.65; br.rotation.x=Math.sin(angle)*0.65;
    br.castShadow=true; scene.add(br);
    if(sub) for(let i=0;i<2;i++){
      branch(angle+(i-0.5)*1.1,len*0.6,py+len*0.3,thick*0.6,false);
    }
  }
  for(let i=0;i<6;i++) branch(i/6*Math.PI*2,1.1+Math.random()*0.7,y+3.1+Math.random()*0.5,0.04);
}

function placeNotes(){
  const spots=[
    {x:-3,y:0.5,z:-11,ry:0.2},
    {x:2.5,y:0,z:-4.5,ry:0.5},
    {x:-5.5,y:0.47,z:-3,ry:-0.3},
    {x:5,y:0,z:-9,ry:0.1},
    {x:-8.5,y:1.45,z:-12.6,ry:0}
  ];
  spots.forEach((p,i)=>{
    const ng=new THREE.BoxGeometry(0.22,0.002,0.28);
    const nm=new THREE.MeshStandardMaterial({color:0xbfaa70,emissive:0x1a1200,emissiveIntensity:0.4});
    const mesh=new THREE.Mesh(ng,nm);
    mesh.position.set(p.x,p.y,p.z); mesh.rotation.y=p.ry;
    mesh.castShadow=true; scene.add(mesh);

    // Glow halo
    const glowG=new THREE.PlaneGeometry(0.45,0.55);
    const glowM=new THREE.MeshStandardMaterial({color:0xffee88,transparent:true,opacity:0.12,emissive:0xffee00,emissiveIntensity:0.6,side:THREE.DoubleSide});
    const glow=new THREE.Mesh(glowG,glowM);
    glow.rotation.x=-Math.PI/2; glow.position.set(p.x,p.y+0.04,p.z); scene.add(glow);

    // Tiny warm point light for note
    const nl=new THREE.PointLight(0xddcc66,0.8,1.5);
    nl.position.set(p.x,p.y+0.3,p.z); scene.add(nl);

    mesh.userData={type:'note',noteId:i,found:false,glow,noteLight:nl};
    interactables.push(mesh);
  });

  // Boxes/drawers
  const boxes=[{x:-4,y:0,z:-5.5},{x:7,y:0,z:-4.5},{x:-9,y:0,z:-13.5}];
  boxes.forEach((p,i)=>{
    const bm2=mat(0x0d0a06,0.96);
    const bMesh=box(0.65,0.42,0.52,bm2);
    bMesh.position.set(p.x,p.y+0.21,p.z); scene.add(bMesh);
    const lid=box(0.67,0.045,0.54,mat(0x0b0905,0.95));
    lid.position.set(p.x,p.y+0.44,p.z); scene.add(lid);
    bMesh.userData={type:'drawer',opened:false,lid,noteId:i%NOTES.length};
    interactables.push(bMesh);
  });
}

function setupLights(){
  // Moonlight — very cold blue
  const moon=new THREE.DirectionalLight(0x0c1020,0.55);
  moon.position.set(-12,22,8);
  moon.castShadow=true;
  moon.shadow.mapSize.width=2048; moon.shadow.mapSize.height=2048;
  moon.shadow.camera.near=0.5; moon.shadow.camera.far=120;
  moon.shadow.camera.left=-35; moon.shadow.camera.right=35;
  moon.shadow.camera.top=35; moon.shadow.camera.bottom=-35;
  moon.shadow.bias=-0.001;
  scene.add(moon);

  // Ambient — near zero
  scene.add(new THREE.AmbientLight(0x04060a,0.9));

  // ── PLAYER FLASHLIGHT — strong and wide ──
  flashlight=new THREE.SpotLight(0xeeddaa,6,18,0.5,0.55,1.2);
  flashlight.castShadow=true;
  flashlight.shadow.mapSize.width=1024; flashlight.shadow.mapSize.height=1024;
  flashlight.shadow.bias=-0.0008;
  camera.add(flashlight);
  flashlight.position.set(0,0,0);

  // Secondary fill light (soft, short range)
  const fill=new THREE.PointLight(0xddccaa,1.2,4);
  fill.position.set(0,-0.3,0);
  camera.add(fill);

  // Flashlight target
  flashTarget=new THREE.Object3D();
  flashTarget.position.set(0,-0.08,-1);
  camera.add(flashTarget);
  flashlight.target=flashTarget;
  scene.add(camera);
}

// ── GHOST ──
function createGhost(){
  const g=new THREE.Group();
  const bodyM=new THREE.MeshStandardMaterial({color:0x040408,transparent:true,opacity:0.75,emissive:0x000004,emissiveIntensity:0.6,side:THREE.DoubleSide});
  const torso=new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.38,1.85,8),bodyM);
  g.add(torso);
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.24,10,10),new THREE.MeshStandardMaterial({color:0x030308,transparent:true,opacity:0.85,emissive:0x00000a,emissiveIntensity:0.5}));
  head.position.y=1.08; g.add(head);
  // Eyes
  const eyeM=new THREE.MeshStandardMaterial({emissive:0xffffff,emissiveIntensity:8,color:0xffffff});
  const eG=new THREE.SphereGeometry(0.045,8,8);
  const eL=new THREE.Mesh(eG,eyeM); eL.position.set(-0.09,1.1,0.21); g.add(eL);
  const eR=new THREE.Mesh(eG,eyeM); eR.position.set(0.09,1.1,0.21); g.add(eR);
  const el=new THREE.PointLight(0x8888ff,1.2,3); el.position.set(0,1.1,0.3); g.add(el);
  // Long arms
  const armM=new THREE.MeshStandardMaterial({color:0x030306,transparent:true,opacity:0.7});
  [-1,1].forEach(side=>{
    const arm=new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.05,1.6,6),armM);
    arm.rotation.z=side*0.5; arm.position.set(side*0.5,0.2,0); g.add(arm);
    const hand=new THREE.Mesh(new THREE.SphereGeometry(0.07,8,8),armM);
    hand.position.set(side*0.95,-0.65,0); g.add(hand);
  });
  g.position.set(20,0.9,-30); g.visible=false;
  scene.add(g); ghost=g;
}

function updateGhost(dt){
  if(!ghost) return;
  ghostTimer+=dt;
  if(!ghostActive && ghostTimer>30+Math.random()*20) activateGhost();
  if(ghostActive){
    const dir=new THREE.Vector3().subVectors(camera.position,ghost.position);
    dir.y=0; const dist=dir.length(); dir.normalize();
    ghost.position.addScaledVector(dir,dt*1.8);
    ghost.position.y=0.9+Math.sin(Date.now()*0.004)*0.12;
    ghost.rotation.y=Math.atan2(dir.x,dir.z)+Math.PI;
    if(dist<9){ sanity=Math.max(0,sanity-dt*4); updateSanity(); }
    if(dist<1.6){ triggerJumpscare(true); deactivateGhost(); }
    if(ghostTimer>70) deactivateGhost();
  }
}
function activateGhost(){
  ghostActive=true; ghost.visible=true;
  const a=Math.random()*Math.PI*2;
  ghost.position.set(camera.position.x+Math.cos(a)*14,0.9,camera.position.z+Math.sin(a)*14);
  playStatic(); playHeartbeat(false);
}
function deactivateGhost(){
  ghostActive=false; ghost.visible=false; ghostTimer=0;
}

// ── CONTROLS ──
const raycaster=new THREE.Raycaster();
let nearbyObj=null;

function setupControls(){
  document.addEventListener('keydown',e=>{
    if(!isGameRunning) return;
    if(e.code==='KeyW'||e.code==='ArrowUp') moveF=true;
    if(e.code==='KeyS'||e.code==='ArrowDown') moveB=true;
    if(e.code==='KeyA'||e.code==='ArrowLeft') moveL=true;
    if(e.code==='KeyD'||e.code==='ArrowRight') moveR=true;
    if(e.code==='KeyE') tryInteract();
    if(e.code==='Escape') closeNote();
  });
  document.addEventListener('keyup',e=>{
    if(e.code==='KeyW'||e.code==='ArrowUp') moveF=false;
    if(e.code==='KeyS'||e.code==='ArrowDown') moveB=false;
    if(e.code==='KeyA'||e.code==='ArrowLeft') moveL=false;
    if(e.code==='KeyD'||e.code==='ArrowRight') moveR=false;
  });
  document.addEventListener('mousemove',e=>{
    if(!isGameRunning) return;
    if(document.pointerLockElement!==document.getElementById('c')) return;
    yaw-=e.movementX*0.0022;
    pitch=Math.max(-1.2,Math.min(1.2,pitch-e.movementY*0.0022));
  });
  document.getElementById('c').addEventListener('click',()=>{
    if(isGameRunning && document.pointerLockElement!==document.getElementById('c'))
      document.getElementById('c').requestPointerLock();
  });
  document.getElementById('note-overlay').addEventListener('click',closeNote);
  document.getElementById('note-close').addEventListener('click',closeNote);
}

function checkInteraction(){
  raycaster.setFromCamera(new THREE.Vector2(0,0),camera);
  const hits=raycaster.intersectObjects(interactables);
  const el=document.getElementById('interact');
  if(hits.length>0&&hits[0].distance<3.8){
    nearbyObj=hits[0].object;
    el.style.opacity='1';
    const ud=nearbyObj.userData;
    if(ud.type==='note'&&!ud.found) el.textContent='[ E ] PAKELTI UŽRAŠĄ';
    else if(ud.type==='note'&&ud.found) el.textContent='[ E ] SKAITYTI IŠ NAUJO';
    else if(ud.type==='drawer'&&!ud.opened) el.textContent='[ E ] ATIDARYTI DĖŽĘ';
    else el.textContent='[ E ] TIKRINTI';
  } else { nearbyObj=null; el.style.opacity='0'; }
}

function tryInteract(){
  if(!nearbyObj) return;
  const ud=nearbyObj.userData;
  if(ud.type==='note'){
    if(!ud.found){
      ud.found=true; notesFound++;
      document.getElementById('nc').textContent=notesFound;
      if(ud.glow) ud.glow.visible=false;
      if(ud.noteLight) ud.noteLight.intensity=0;
      sanity=Math.max(0,sanity-9); updateSanity();
      playPaperRustle();
    }
    openNote(ud.noteId);
  } else if(ud.type==='drawer'&&!ud.opened) openDrawer(nearbyObj);
}

function openDrawer(mesh){
  mesh.userData.opened=true;
  playDoor();
  const lid=mesh.userData.lid;
  let t=0;
  const iv=setInterval(()=>{
    t+=0.04; lid.position.z=mesh.position.z-t*0.32; lid.rotation.x=-t*0.9;
    if(t>=1){
      clearInterval(iv);
      if(mesh.userData.noteId>=0){
        // Spawn note on top of box
        const ng=new THREE.BoxGeometry(0.18,0.002,0.23);
        const nm2=new THREE.MeshStandardMaterial({color:0xbfaa70,emissive:0x1a1200,emissiveIntensity:0.5});
        const nm=new THREE.Mesh(ng,nm2);
        nm.position.set(mesh.position.x,mesh.position.y+0.45,mesh.position.z);
        scene.add(nm);
        nm.userData={type:'note',noteId:mesh.userData.noteId,found:false,glow:{visible:false},noteLight:null};
        interactables.push(nm);
        setTimeout(()=>playStatic(0.5),200);
      }
    }
  },28);
}

function openNote(id){
  const n=NOTES[id]; if(!n) return;
  document.getElementById('note-title').textContent=n.title;
  document.getElementById('note-body').textContent=n.body;
  document.getElementById('note-overlay').style.display='flex';
  if(document.pointerLockElement) document.exitPointerLock();
  isGameRunning=false;
}
function closeNote(){
  document.getElementById('note-overlay').style.display='none';
  isGameRunning=true;
  document.getElementById('c').requestPointerLock();
  if(notesFound>=4) setTimeout(()=>triggerJumpscare('rush',false),1200);
}

function updateSanity(){
  const s=Math.max(0,Math.floor(sanity));
  document.getElementById('san').textContent=s;
  document.getElementById('sanity-bar').style.width=(s*1.2)+'px';
  // Red breathe vignette at low sanity
  const v=Math.max(0,(100-s)/100);
  document.getElementById('breathe').style.opacity=v*0.8;
  if(s<=0) triggerDeath();
}

// ═══════════════════════════════════════════════════════════
//  JUMPSCARES — ANIMATED
// ═══════════════════════════════════════════════════════════
let lastJumpscare=0;
const ANIM_TYPES=['rush','shake','twitch','flash'];

function triggerJumpscare(animType='rush',deadly=false){
  const now=Date.now();
  if(now-lastJumpscare<12000) return;
  lastJumpscare=now;

  const js=document.getElementById('jumpscare');
  const jst=document.getElementById('js-text');
  const jsr=document.getElementById('js-overlay-red');
  const imgEl=document.getElementById('monster-img');
  const fbEl=document.getElementById('js-fallback');

  // Pick animation
  const anim=animType==='rush'?'js-anim-rush':
              animType==='shake'?'js-anim-shake':
              animType==='twitch'?'js-anim-twitch':'js-anim-flash';

  js.className=''; js.style.display='flex'; js.style.background='#000';
  void js.offsetWidth; // reflow
  js.classList.add(anim);

  // If PNG loaded, show it; otherwise show canvas fallback
  if(imgEl.src && imgEl.complete && imgEl.naturalWidth>0){
    imgEl.style.display='block'; fbEl.style.display='none';
  } else {
    imgEl.style.display='none'; fbEl.style.display='block';
  }

  // Red overlay pulse
  jsr.style.background='rgba(180,0,0,0.0)';
  setTimeout(()=>jsr.style.background='rgba(180,0,0,0.3)',50);
  setTimeout(()=>jsr.style.background='rgba(180,0,0,0)',300);

  // Text flash
  jst.style.opacity='0';
  setTimeout(()=>{jst.style.opacity='1';jst.style.transition='opacity 0.1s';},200);
  setTimeout(()=>{jst.style.opacity='0';},700);

  playScream();
  setTimeout(()=>playStatic(),100);

  // White flashes
  let fl=0;
  const fi=setInterval(()=>{
    js.style.background=fl%2===0?'rgba(255,255,255,0.8)':'#000';
    fl++; if(fl>8){clearInterval(fi); js.style.background='#000';}
  },65);

  setTimeout(()=>{
    js.style.display='none'; js.className='';
    if(deadly){ sanity=Math.max(0,sanity-35); updateSanity(); }
  },1400);
}

function scheduleJumpscares(){
  function next(){
    const d=25000+Math.random()*55000;
    jumpscareTimer=setTimeout(()=>{
      if(isGameRunning){
        const r=Math.random();
        if(r<0.3){ playScream(); playStatic(); } // audio only
        else if(r<0.55){ playWhisper(); playDistantBang(); }
        else { triggerJumpscare(ANIM_TYPES[Math.floor(Math.random()*ANIM_TYPES.length)],false); }
      }
      next();
    },d);
  }
  next();
}

function triggerDeath(){
  isGameRunning=false;
  document.getElementById('death').style.display='flex';
  playScream();
}

// ═══════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  if(!isGameRunning){ renderer.render(scene,camera); return; }
  const t=Date.now()*0.001;

  // Camera
  camera.rotation.order='YXZ';
  camera.rotation.y=yaw;
  camera.rotation.x=pitch;

  // Movement
  const speed=3.8;
  const d=new THREE.Vector3();
  if(moveF) d.z-=1; if(moveB) d.z+=1; if(moveL) d.x-=1; if(moveR) d.x+=1;
  d.normalize().applyEuler(new THREE.Euler(0,yaw,0));
  const np=camera.position.clone().addScaledVector(d,speed*dt);
  np.x=Math.max(-19,Math.min(19,np.x));
  np.z=Math.max(-22,Math.min(18,np.z));
  np.y=1.7;
  camera.position.copy(np);

  const moving=moveF||moveB||moveL||moveR;
  if(moving){
    camera.position.y=1.7+Math.sin(t*9)*0.028;
    footstepTimer+=dt;
    if(footstepTimer>0.42){ footstepTimer=0; playFootstep(); }
  } else {
    camera.position.y=1.7+Math.sin(t*1.5)*0.006;
  }

  // Flashlight flicker (subtle breathing)
  if(flashlight){
    flashlight.intensity=6+Math.sin(t*0.8)*0.15+Math.sin(t*3.1)*0.08;
  }

  // Map lamp flicker
  for(const pl of flickerLights){
    pl.userData.flicker+=dt;
    const fv=Math.sin(pl.userData.flicker*11.3)*0.18+Math.sin(pl.userData.flicker*7.7)*0.1+Math.sin(pl.userData.flicker*31)*0.05;
    if(!pl.userData.dead){
      pl.intensity=pl.userData.base+fv;
      if(Math.random()<pl.userData.deadChance){ pl.userData.dead=true; pl.intensity=0; setTimeout(()=>{pl.userData.dead=false;},400+Math.random()*600); }
    }
  }

  // Note glow pulse
  interactables.forEach(o=>{
    if(o.userData.glow&&!o.userData.found){
      o.userData.glow.material.opacity=0.08+Math.sin(t*2.2)*0.07;
    }
  });

  // Sanity decay
  sanityTimer+=dt;
  if(sanityTimer>8){ sanityTimer=0; sanity=Math.max(0,sanity-0.8); updateSanity(); }

  // VHS intensity by sanity
  vhsCv.style.opacity=0.25+(1-sanity/100)*0.5;

  checkInteraction();
  updateGhost(dt);
  renderer.render(scene,camera);
}
